name: Model Evaluation Strategy
on: [push]

jobs:
  evaluate-json-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Schema Validity Test
        # This script checks if the model's outputs are valid JSON
        run: python src/eval.py --threshold 0.95
